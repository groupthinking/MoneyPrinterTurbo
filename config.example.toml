[app]
video_source = "pexels" # "pexels" or "pixabay"

# 是否隐藏配置面板
hide_config = false

# Azure TTS V1(edge_tts) 单次流式请求超时时间，单位秒。
edge_tts_timeout = 30

# TLS certificate verification for external API calls and material downloads.
tls_verify = true

# Pexels API Key — https://www.pexels.com/api/
pexels_api_keys = []

# Pixabay API Key — https://pixabay.com/api/docs/
pixabay_api_keys = []

# LLM provider — openai | moonshot | azure | qwen | deepseek | gemini | ollama
#                 g4f | oneapi | cloudflare | minimax | ernie | modelscope | litellm
llm_provider = "openai"

########## Pollinations AI
pollinations_api_key = ""
pollinations_base_url = "https://pollinations.ai/api/v1"
pollinations_model_name = "openai-fast"

########## Ollama
ollama_base_url = ""
ollama_model_name = ""

########## OpenAI
openai_api_key = ""
openai_base_url = ""
openai_model_name = "gpt-4o-mini"

########## Moonshot
moonshot_api_key = ""
moonshot_base_url = "https://api.moonshot.cn/v1"
moonshot_model_name = "moonshot-v1-8k"

########## OneAPI
oneapi_api_key = ""
oneapi_base_url = ""
oneapi_model_name = ""

########## G4F (disabled by default — set enable_g4f=true only after accepting its risks)
enable_g4f = false
g4f_model_name = "gpt-3.5-turbo"

########## Azure OpenAI
azure_api_key = ""
azure_base_url = ""
azure_model_name = "gpt-35-turbo"
azure_api_version = "2024-02-15-preview"

########## Gemini
gemini_api_key = ""
gemini_model_name = "gemini-2.5-flash"

########## Qwen
qwen_api_key = ""
qwen_model_name = "qwen-max"

########## MiniMax
minimax_api_key = ""
minimax_base_url = "https://api.minimax.io/v1"
minimax_model_name = "MiniMax-M2.7"

########## DeepSeek
deepseek_api_key = ""
deepseek_base_url = "https://api.deepseek.com"
deepseek_model_name = "deepseek-chat"

########## ModelScope
modelscope_api_key = ""
modelscope_base_url = "https://api-inference.modelscope.cn/v1/"
modelscope_model_name = "Qwen/Qwen3-32B"

########## LiteLLM (100+ providers — anthropic/claude-*, bedrock/*, gemini/*, etc.)
# Set provider API keys as env vars: OPENAI_API_KEY, ANTHROPIC_API_KEY, etc.
litellm_model_name = "openai/gpt-4o-mini"

# Subtitle provider: "edge" or "whisper"
subtitle_provider = "edge"

#
# ImageMagick (Windows only — auto-detected elsewhere)
# imagemagick_path = "C:\\Program Files (x86)\\ImageMagick-7.1.1-Q16\\magick.exe"

# FFMPEG (auto-detected; set manually if auto-download fails)
# ffmpeg_path = "C:\\Users\\harry\\Downloads\\ffmpeg.exe"

# Public endpoint for video download URLs (leave empty to use localhost)
# endpoint = "https://yourdomain.com"
endpoint = ""

# Video material storage — "" = ./storage/cache_videos, "task" = per-task folder
material_directory = ""

# Task state backend
enable_redis = false
redis_host = "localhost"
redis_port = 6379
redis_db = 0
redis_password = ""

# Concurrency limits
max_concurrent_tasks = 5
max_queued_tasks = 100

##########################################################################
# API Authentication & Monetization
##########################################################################

# Single API key for the REST API (leave empty = open access, backward-compatible).
# Set to any non-empty string to require X-Api-Key header on all requests.
api_key = ""

# Watermark text burned into the top-left corner of every generated video.
# Leave empty to disable. Useful for free-tier branding.
# watermark_text = "@yourhandle"
watermark_text = ""

##########################################################################
# Cross-Post (TikTok / Instagram via Upload-Post)
# https://upload-post.com
##########################################################################

upload_post_enabled = false
upload_post_api_key = ""
upload_post_username = ""
upload_post_platforms = ["tiktok", "instagram"]
upload_post_auto_upload = false

##########################################################################
# Affiliate Marketing Networks
##########################################################################

########## Amazon Associates (PA API 5.0)
# https://affiliate-program.amazon.com
# PA API credentials: https://webservices.amazon.com/paapi5/documentation/register-for-pa-api.html
amazon_access_key = ""
amazon_secret_key = ""
amazon_partner_tag = ""          # e.g. "mytag-20"
amazon_region = "us-east-1"      # eu-west-1 for UK/EU
amazon_host = "webservices.amazon.com"

########## ClickBank
# Your account nickname (no API key needed — hoplinks are constructed locally)
clickbank_affiliate_id = ""

########## CJ Affiliate
# Personal Access Token: https://members.cj.com/member/publisher/api-keys.do
cj_api_key = ""
cj_website_id = ""

########## Awin
# https://www.awin.com
awin_api_key = ""
awin_publisher_id = ""


[whisper]
# Only effective when subtitle_provider = "whisper"
model_size = "large-v3"
device = "CPU"
compute_type = "int8"


[proxy]
# http = "http://10.10.1.10:3128"
# https = "http://10.10.1.10:1080"


[azure]
# Azure Speech API Key — https://portal.azure.com
speech_key = ""
speech_region = ""


[siliconflow]
# https://siliconflow.cn
api_key = ""


[ui]
hide_log = false
# subtitle_position = "bottom"   # top | center | bottom | custom
# custom_position = 70.0         # % from top, only when subtitle_position = "custom"


##########################################################################
# Per-API-key daily quota (multi-tenant / SaaS)
#
# Keys in this table are also treated as valid API keys in addition to the
# single `api_key` above. Set a value to -1 for unlimited, or a positive
# integer for a daily cap.
#
# Example:
#   "free_tier_key_abc" = 5    # 5 videos / day
#   "paid_tier_key_xyz" = -1   # unlimited
#   "team_key_def"      = 50   # 50 videos / day
##########################################################################
[api_key_quotas]
# "your-key-here" = -1
